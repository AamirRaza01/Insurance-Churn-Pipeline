training_pipeline_config:
  pipeline_name: insurance_predictor
  artifact_dir: artifacts

data_ingestion_config:
  data_ingestion_dir: data_ingestion
  feature_store_file_path: feature_store/insurance.csv
  training_file_path: ingested/train.csv
  testing_file_path: ingested/test.csv
  train_test_split_ratio: 0.2
  collection_name: insurance_data

data_validation_config:
  data_validation_dir: data_validation
  validation_report_file_name: validation_report.yaml

data_transformation_config:
  data_transformation_dir: data_transformation
  transformed_train_file_path: transformed/train.npy
  transformed_test_file_path: transformed/test.npy
  transformed_object_file_path: transformed_object/preprocessor.pkl

model_trainer_config:
  model_trainer_dir: model_trainer
  trained_model_file_path: trained_model/model.pkl
  expected_accuracy: 0.6
  overfitting_underfitting_threshold: 0.05

model_evaluation_config:
  model_evaluation_dir: model_evaluation
  report_name: evaluation_report.yaml
  change_threshold: 0.02

model_pusher_config:
  model_pusher_dir: model_pusher
  saved_model_dir: saved_models